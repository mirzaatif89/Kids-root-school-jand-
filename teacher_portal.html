<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="auth.js"></script>
    <style>
        :root {
            --portal-bg: #f8fafc;
            --portal-card: #ffffff;
            --portal-border: #dbe3ee;
            --portal-text: #0f172a;
            --portal-muted: #64748b;
            --portal-primary: #20b0a4;
            --portal-primary-dark: #0f766e;
            --portal-soft: #eef7f6;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #eef7f6;
            color: var(--portal-text);
            font-family: 'Nunito', 'Inter', sans-serif;
        }

        .teacher-portal-header {
            background: #ffffff;
            color: var(--portal-text);
            padding: 14px clamp(16px, 4vw, 40px);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            border-bottom: 1px solid #cae8e4;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .portal-logo {
            width: 180px;
            max-width: 48vw;
            height: 64px;
            object-fit: contain;
            display: block;
        }

        .portal-header-title {
            margin: 0;
            color: var(--portal-primary-dark);
            font-size: clamp(20px, 3vw, 28px);
            font-weight: 700;
            letter-spacing: 0;
            text-align: center;
        }

        .portal-header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .logout-btn {
            border: 1px solid #cae8e4;
            background: #ffffff;
            color: var(--portal-primary-dark);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .teacher-portal {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px clamp(14px, 3vw, 28px) 40px;
        }

        .profile-card,
        .panel-card,
        .stat-card {
            background: #ffffff;
            border: 1px solid #cae8e4;
            border-radius: 18px;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.09);
        }

        .profile-card {
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
        }

        .profile-main {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        .avatar {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: var(--portal-primary);
            color: #ffffff;
            display: grid;
            place-items: center;
            font-size: 28px;
            font-weight: 800;
            overflow: hidden;
            flex: 0 0 auto;
            border: 4px solid #ffffff;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-main h2 {
            margin: 0 0 5px;
            font-size: 24px;
            letter-spacing: 0;
        }

        .muted {
            color: var(--portal-muted);
        }

        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(32, 176, 164, 0.22);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--portal-primary-dark);
            font-size: 13px;
            background: #ffffff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .stat-card {
            padding: 17px;
            border-left: 4px solid var(--portal-primary);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            right: -28px;
            top: -28px;
            width: 92px;
            height: 92px;
            border-radius: 999px;
            background: rgba(32, 176, 164, 0.1);
        }

        .stat-card:nth-child(2)::after {
            background: rgba(32, 176, 164, 0.12);
        }

        .stat-card:nth-child(3)::after {
            background: rgba(32, 176, 164, 0.1);
        }

        .stat-card:nth-child(4)::after {
            background: rgba(32, 176, 164, 0.12);
        }

        .stat-card strong {
            display: block;
            margin-top: 8px;
            font-size: 22px;
        }

        .teacher-options {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin: 18px 0 0;
        }

        .teacher-option-btn {
            min-height: 66px;
            border: 1px solid #cae8e4;
            border-radius: 12px;
            background: #ffffff;
            color: var(--portal-primary-dark);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.09);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.85rem 1rem;
            font-size: 0.9rem;
            font-weight: 800;
            text-align: center;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .teacher-option-btn i {
            width: 20px;
            height: 20px;
            min-width: 20px;
            padding: 0;
            background: transparent;
            color: var(--portal-primary-dark);
        }

        .teacher-option-btn:hover {
            border-color: var(--portal-primary-dark);
            background: var(--portal-primary-dark);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.13);
        }

        .teacher-option-btn:hover i {
            color: #ffffff;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 18px;
            align-items: start;
        }

        .section-stack {
            display: grid;
            gap: 18px;
        }

        .panel-card {
            padding: 20px;
        }

        .panel-card h3 {
            margin: 0 0 14px;
            font-size: 18px;
            letter-spacing: 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .info-row {
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 14px;
            padding: 12px;
            background: linear-gradient(135deg, #ffffff, #f8fafc);
        }

        .info-row span,
        .info-row strong {
            display: block;
        }

        .info-row strong {
            font-size: 12px;
            color: var(--portal-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .schedule-list,
        .notice-list,
        .attendance-list {
            display: grid;
            gap: 10px;
        }

        .list-item {
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 14px;
            padding: 12px;
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }

        .list-item-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-weight: 700;
        }

        .complaint-form {
            display: grid;
            gap: 10px;
        }

        .complaint-form label {
            display: block;
            color: var(--portal-muted);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .complaint-form input,
        .complaint-form textarea {
            width: 100%;
            border: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
            background: #ffffff;
            color: var(--portal-text);
        }

        .complaint-form textarea {
            min-height: 96px;
            resize: vertical;
        }

        .portal-btn {
            min-height: 38px;
            border: 0;
            border-radius: 10px;
            background: var(--portal-primary-dark);
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 9px 13px;
        }

        .empty-note {
            border: 1px dashed #9fd8d2;
            border-radius: 14px;
            padding: 14px;
            color: var(--portal-primary-dark);
            background: var(--portal-soft);
        }

        .teacher-option-panel {
            margin-top: 18px;
            display: none;
        }

        .teacher-option-panel.active {
            display: block;
        }

        .teacher-portal.portal-screen-open .profile-card,
        .teacher-portal.portal-screen-open .stats-grid,
        .teacher-portal.portal-screen-open .teacher-options {
            display: none !important;
        }

        .teacher-option-panel.portal-screen-active {
            display: block !important;
            margin-top: 0;
        }

        .portal-screen-back {
            min-height: 40px;
            border: 1px solid #cae8e4;
            border-radius: 10px;
            background: #ffffff;
            color: var(--portal-primary-dark);
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.55rem 0.8rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .portal-form-grid,
        .portal-mini-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .portal-field {
            display: grid;
            gap: 6px;
        }

        .portal-field label {
            color: var(--portal-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .portal-field input,
        .portal-field select,
        .portal-field textarea {
            width: 100%;
            min-height: 42px;
            border: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
            background: #ffffff;
            color: var(--portal-text);
        }

        .portal-field textarea {
            min-height: 96px;
            resize: vertical;
        }

        .portal-table-wrap {
            width: 100%;
            overflow-x: auto;
            margin-top: 12px;
        }

        .portal-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 620px;
        }

        .portal-table th,
        .portal-table td {
            border-bottom: 1px solid #dcefed;
            padding: 12px;
            text-align: left;
        }

        .portal-table th {
            color: var(--portal-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .portal-metric {
            border: 1px solid #cae8e4;
            border-radius: 14px;
            background: #fbfefe;
            padding: 14px;
        }

        .portal-metric span,
        .portal-metric strong {
            display: block;
        }

        .portal-metric span {
            color: var(--portal-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .portal-metric strong {
            margin-top: 6px;
            font-size: 18px;
        }

        .panel-action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        @media (max-width: 1040px) {
            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .teacher-options {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .teacher-portal-header,
            .profile-card {
                align-items: flex-start;
                flex-direction: column;
            }

            .portal-header-actions {
                justify-content: flex-start;
            }

            .portal-grid,
            .info-grid,
            .portal-form-grid,
            .portal-mini-grid {
                grid-template-columns: 1fr;
            }

            .profile-card {
                padding: 18px;
            }
        }

        @media (max-width: 560px) {
            .teacher-portal-header {
                padding: 12px 16px;
            }

            .portal-logo {
                width: 150px;
                height: 54px;
            }

            .portal-header-title {
                font-size: 18px;
            }

            .teacher-portal {
                padding: 16px 12px 30px;
            }

            .profile-main {
                align-items: flex-start;
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .teacher-options {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .panel-card,
            .stat-card,
            .profile-card {
                border-radius: 16px;
            }

            .list-item-top {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header class="teacher-portal-header">
        <img class="portal-logo" src="images/logo.png" alt="Apexiums School System logo">
        <h1 class="portal-header-title">Teacher Portal</h1>
        <div class="portal-header-actions">
            <button class="logout-btn" onclick="logoutUser()">
                <i data-lucide="log-out" width="16"></i>
                Logout
            </button>
        </div>
    </header>

    <main class="teacher-portal">
        <section class="profile-card">
            <div class="profile-main">
                <div class="avatar" id="teacherAvatar">T</div>
                <div>
                    <h2 id="teacherName">Loading...</h2>
                    <div class="muted" id="teacherRoleLine">Teacher</div>
                    <div class="pill-row">
                        <span class="meta-pill"><i data-lucide="shield-check" width="15"></i> Account Active</span>
                        <span class="meta-pill"><i data-lucide="user" width="15"></i> <span id="teacherUsername">-</span></span>
                        <span class="meta-pill"><i data-lucide="building-2" width="15"></i> <span id="teacherCampus">-</span></span>
                    </div>
                </div>
            </div>
            <div>
                <div class="muted">Employee ID</div>
                <strong id="employeeCode">-</strong>
            </div>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="muted">Subject</span>
                <strong id="subjectStat">-</strong>
            </div>
            <div class="stat-card">
                <span class="muted">Monthly Salary</span>
                <strong id="salaryStat">PKR 0</strong>
            </div>
            <div class="stat-card">
                <span class="muted">Assigned Lectures</span>
                <strong id="lectureCount">0</strong>
            </div>
            <div class="stat-card">
                <span class="muted">Attendance This Month</span>
                <strong id="attendanceSummary">-</strong>
            </div>
        </section>

        <section class="teacher-options" aria-label="Teacher portal options">
            <button class="teacher-option-btn" type="button" data-teacher-panel="attendancePanel">
                <i data-lucide="calendar-check" width="16"></i>
                Attendance
            </button>
            <button class="teacher-option-btn" type="button" data-teacher-panel="salaryPanel">
                <i data-lucide="wallet" width="16"></i>
                Salary Record
            </button>
            <button class="teacher-option-btn" type="button" data-teacher-panel="timeTablePanel">
                <i data-lucide="clock" width="16"></i>
                Time Table
            </button>
            <button class="teacher-option-btn" type="button" data-teacher-panel="complaintsPanel">
                <i data-lucide="message-square" width="16"></i>
                Complains
            </button>
            <button class="teacher-option-btn" type="button" data-teacher-panel="leavePanel">
                <i data-lucide="calendar-minus" width="16"></i>
                Apply for Leave
            </button>
            <button class="teacher-option-btn" type="button" data-teacher-panel="classesPanel">
                <i data-lucide="school" width="16"></i>
                Assigned Classes
            </button>
            <button class="teacher-option-btn" type="button" data-teacher-panel="lecturesPanel">
                <i data-lucide="presentation" width="16"></i>
                Assigned Lectures
            </button>
        </section>

        <section class="panel-card teacher-option-panel" id="attendancePanel">
            <h3>Attendance</h3>
            <form id="teacherSelfAttendanceForm" class="portal-form-grid">
                <div class="portal-field">
                    <label for="teacherAttendanceDate">Date</label>
                    <input type="date" id="teacherAttendanceDate" required>
                </div>
                <div class="portal-field">
                    <label for="teacherAttendanceStatus">Status</label>
                    <select id="teacherAttendanceStatus" required>
                        <option value="Present">Present</option>
                        <option value="Late">Late</option>
                        <option value="Leave">Leave</option>
                    </select>
                </div>
                <div class="portal-field">
                    <label>&nbsp;</label>
                    <button class="portal-btn" type="submit"><i data-lucide="check" width="15"></i> Save Attendance</button>
                </div>
            </form>
            <div class="portal-mini-grid" id="teacherAttendanceSummary"></div>
            <div class="notice-list" id="teacherAttendanceRecords"></div>
        </section>

        <section class="panel-card teacher-option-panel" id="salaryPanel">
            <h3>Salary Record</h3>
            <div class="portal-mini-grid" id="teacherSalaryRecord"></div>
        </section>

        <section class="panel-card teacher-option-panel" id="timeTablePanel">
            <h3>Time Table</h3>
            <div id="teacherTimeTable"></div>
        </section>

        <section class="panel-card teacher-option-panel" id="complaintsPanel">
            <h3>Complains</h3>
            <div class="notice-list" id="teacherIncomingComplaints"></div>
        </section>

        <section class="panel-card teacher-option-panel" id="leavePanel">
            <h3>Apply for Leave</h3>
            <form id="teacherLeaveForm">
                <div class="portal-form-grid">
                    <div class="portal-field">
                        <label for="teacherLeaveFrom">From Date</label>
                        <input type="date" id="teacherLeaveFrom" required>
                    </div>
                    <div class="portal-field">
                        <label for="teacherLeaveTo">To Date</label>
                        <input type="date" id="teacherLeaveTo" required>
                    </div>
                    <div class="portal-field" style="grid-column: 1 / -1;">
                        <label for="teacherLeaveReason">Reason</label>
                        <textarea id="teacherLeaveReason" required placeholder="Write leave reason"></textarea>
                    </div>
                </div>
                <div class="panel-action-row">
                    <button class="portal-btn" type="submit"><i data-lucide="send" width="15"></i> Submit Leave</button>
                </div>
            </form>
            <div class="notice-list" id="teacherLeaveHistory"></div>
        </section>

        <section class="panel-card teacher-option-panel" id="classesPanel">
            <h3>Assigned Classes</h3>
            <div class="notice-list" id="teacherAssignedClasses"></div>
        </section>

        <section class="panel-card teacher-option-panel" id="lecturesPanel">
            <h3>Assigned Lectures</h3>
            <div class="notice-list" id="teacherAssignedLectures"></div>
        </section>
    </main>

    <script>
        const API_BASE_URL = (() => {
            const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
            const backendUrl = isLocalhost
                ? (window.location.protocol === 'file:' ? 'http://localhost:3000' : window.location.origin)
                : (window.ENV_BACKEND_URL || window.location.origin);
            return `${backendUrl}/api`;
        })();
        const loggedInUser = JSON.parse(sessionStorage.getItem('loggedInUser') || 'null');
        const authToken = sessionStorage.getItem('eduCore_token') || '';
        const COMPLAINT_KEY = 'eduCore_complaints';
        const TEACHER_LEAVE_KEY = 'eduCore_teacher_leave_requests';
        const TEACHER_SALARY_KEY = 'eduCore_teacher_salaries';
        let currentTeacherProfile = null;

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value || '-';
        }

        function formatCurrency(value) {
            const amount = Number.parseInt(value || 0, 10) || 0;
            return `PKR ${amount.toLocaleString('en-PK')}`;
        }

        function normalizeSchedule(rawSchedule) {
            if (!rawSchedule) return [];
            if (Array.isArray(rawSchedule)) return rawSchedule;
            try {
                const parsed = JSON.parse(rawSchedule);
                return Array.isArray(parsed) ? parsed : [];
            } catch (_error) {
                return [];
            }
        }

        function readLocal(key) {
            try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch (_error) { return []; }
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char]));
        }

        function todayKey() {
            return new Date().toISOString().slice(0, 10);
        }

        function monthKey(date = new Date()) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function getTeacherIdentity(teacher = currentTeacherProfile) {
            return String(teacher?.id || teacher?.employeeCode || loggedInUser?.id || loggedInUser?.username || '').trim();
        }

        function getTeacherSalaryPayment(month = monthKey()) {
            const teacherId = getTeacherIdentity();
            const records = readLocal(TEACHER_SALARY_KEY);
            const map = records && !Array.isArray(records) ? records : {};
            return map[`teacher_${teacherId}_${month}`] || map[`${teacherId}_${month}`] || null;
        }

        function getSchedule() {
            return normalizeSchedule(currentTeacherProfile?.schedule);
        }

        function uniqueClasses(schedule = getSchedule()) {
            const classes = new Map();
            schedule.forEach((item) => {
                const className = item.classGrade || item.className || item.class || '';
                if (!className) return;
                const key = className.toLowerCase();
                if (!classes.has(key)) classes.set(key, className);
            });
            return Array.from(classes.values());
        }

        function getTeacherAttendanceMonth(attendanceStore, teacherId, month = monthKey()) {
            const direct = attendanceStore?.[`${teacherId}_${month}`];
            const legacy = attendanceStore?.[`teacher_${teacherId}_${month}`];
            return Array.isArray(direct) ? direct : (Array.isArray(legacy) ? legacy : []);
        }

        async function getTeacherAttendanceStore() {
            try {
                const response = await fetch(`${API_BASE_URL}/teacher-attendance`, {
                    headers: authToken ? { Authorization: `Bearer ${authToken}` } : {}
                });
                const result = response.ok ? await response.json() : null;
                if (result?.attendance) {
                    localStorage.setItem('eduCore_teacher_attendance', JSON.stringify(result.attendance));
                    return result.attendance;
                }
            } catch (_error) {
                // Fall back to browser cache below.
            }
            return readLocal('eduCore_teacher_attendance');
        }

        function renderPortalList(hostId, items, emptyText, renderItem) {
            const host = document.getElementById(hostId);
            if (!host) return;
            if (!items.length) {
                host.innerHTML = `<div class="empty-note">${escapeHtml(emptyText)}</div>`;
                return;
            }
            host.innerHTML = items.map(renderItem).join('');
            if (window.lucide) window.lucide.createIcons();
        }

        async function renderSelfAttendance() {
            const teacherId = getTeacherIdentity();
            const store = await getTeacherAttendanceStore();
            const month = monthKey();
            const monthly = getTeacherAttendanceMonth(store, teacherId, month);
            const counted = monthly.filter((status) => ['Present', 'Late', 'Absent', 'Leave'].includes(status));
            const present = counted.filter((status) => status === 'Present').length;
            const late = counted.filter((status) => status === 'Late').length;
            const leave = counted.filter((status) => status === 'Leave').length;
            setText('attendanceSummary', counted.length ? `${present + late}/${counted.length}` : '-');

            const summary = document.getElementById('teacherAttendanceSummary');
            if (summary) {
                summary.innerHTML = `
                    <div class="portal-metric"><span>Month</span><strong>${escapeHtml(month)}</strong></div>
                    <div class="portal-metric"><span>Present / Late</span><strong>${present + late}</strong></div>
                    <div class="portal-metric"><span>Leave</span><strong>${leave}</strong></div>
                `;
            }

            const rows = monthly
                .map((status, index) => ({ day: index + 1, status }))
                .filter((item) => ['Present', 'Late', 'Absent', 'Leave'].includes(item.status))
                .slice(-10)
                .reverse();
            renderPortalList('teacherAttendanceRecords', rows, 'No attendance record is available for this month.', (item) => `
                <div class="list-item">
                    <div class="list-item-top">
                        <span>${escapeHtml(`${month}-${String(item.day).padStart(2, '0')}`)}</span>
                        <span>${escapeHtml(item.status)}</span>
                    </div>
                </div>
            `);
        }

        function renderSalaryRecord() {
            const host = document.getElementById('teacherSalaryRecord');
            if (!host) return;
            const month = monthKey();
            const payment = getTeacherSalaryPayment(month);
            const gross = Number.parseInt(currentTeacherProfile?.salary || 0, 10) || 0;
            host.innerHTML = `
                <div class="portal-metric"><span>Month</span><strong>${escapeHtml(month)}</strong></div>
                <div class="portal-metric"><span>Monthly Salary</span><strong>${formatCurrency(gross)}</strong></div>
                <div class="portal-metric"><span>Status</span><strong>${payment ? 'Transferred' : 'Pending'}</strong></div>
                <div class="portal-metric"><span>Transfer Date</span><strong>${escapeHtml(payment?.date || '-')}</strong></div>
            `;
        }

        function renderTimeTable() {
            const schedule = getSchedule();
            const host = document.getElementById('teacherTimeTable');
            if (!host) return;
            if (!schedule.length) {
                host.innerHTML = '<div class="empty-note">No timetable has been assigned yet.</div>';
                return;
            }
            host.innerHTML = `
                <div class="portal-table-wrap">
                    <table class="portal-table">
                        <thead><tr><th>Day</th><th>Class</th><th>Subject</th><th>Time</th><th>Room</th></tr></thead>
                        <tbody>
                            ${schedule.map((item) => `
                                <tr>
                                    <td>${escapeHtml(item.day || item.weekDay || '-')}</td>
                                    <td>${escapeHtml(item.classGrade || item.className || item.class || '-')}</td>
                                    <td>${escapeHtml(item.subject || '-')}</td>
                                    <td>${escapeHtml([item.startTime || item.start, item.endTime || item.end].filter(Boolean).join(' - ') || item.time || '-')}</td>
                                    <td>${escapeHtml(item.room || '-')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderIncomingComplaints() {
            const teacherId = getTeacherIdentity().toLowerCase();
            const teacherName = String(currentTeacherProfile?.fullName || loggedInUser?.fullName || '').toLowerCase();
            const complaints = readLocal(COMPLAINT_KEY)
                .filter((item) => {
                    const role = String(item.senderRole || '').toLowerCase();
                    const targetId = String(item.teacherId || item.targetTeacherId || '').toLowerCase();
                    const targetName = String(item.teacherName || item.targetTeacherName || '').toLowerCase();
                    return role === 'student' || role === 'parent' || targetId === teacherId || (teacherName && targetName === teacherName);
                })
                .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
            renderPortalList('teacherIncomingComplaints', complaints, 'No student or parent complaints are available.', (item) => `
                <div class="list-item">
                    <div class="list-item-top">
                        <span>${escapeHtml(item.subject || 'Complaint')}</span>
                        <span>${escapeHtml(item.status || 'Pending')}</span>
                    </div>
                    <div class="muted">${escapeHtml(item.senderRole || '-')} - ${escapeHtml(item.senderName || '-')} ${item.senderClass ? `| ${escapeHtml(item.senderClass)}` : ''}</div>
                    <div>${escapeHtml(item.message || '-')}</div>
                    ${item.reply ? `<div class="empty-note" style="margin-top:8px;"><strong>Reply:</strong><br>${escapeHtml(item.reply)}</div>` : ''}
                </div>
            `);
        }

        function getTeacherLeaveRequests() {
            const teacherId = getTeacherIdentity().toLowerCase();
            return readLocal(TEACHER_LEAVE_KEY)
                .filter((item) => String(item.teacherId || '').toLowerCase() === teacherId)
                .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
        }

        function renderTeacherLeaveHistory() {
            renderPortalList('teacherLeaveHistory', getTeacherLeaveRequests(), 'No leave request submitted yet.', (item) => `
                <div class="list-item">
                    <div class="list-item-top">
                        <span>${escapeHtml(item.fromDate || '-')} to ${escapeHtml(item.toDate || '-')}</span>
                        <span>${escapeHtml(item.status || 'Pending')}</span>
                    </div>
                    <div>${escapeHtml(item.reason || '-')}</div>
                </div>
            `);
        }

        function renderAssignedClasses() {
            const classes = uniqueClasses();
            renderPortalList('teacherAssignedClasses', classes, 'No classes have been assigned yet.', (className) => `
                <div class="list-item">
                    <div class="list-item-top"><span>${escapeHtml(className)}</span><span>Assigned</span></div>
                </div>
            `);
        }

        function renderAssignedLectures() {
            const schedule = getSchedule();
            renderPortalList('teacherAssignedLectures', schedule, 'No lectures have been assigned yet.', (item) => `
                <div class="list-item">
                    <div class="list-item-top">
                        <span>${escapeHtml(item.subject || 'Lecture')}</span>
                        <span>${escapeHtml([item.startTime || item.start, item.endTime || item.end].filter(Boolean).join(' - ') || item.time || '-')}</span>
                    </div>
                    <div class="muted">${escapeHtml(item.day || item.weekDay || '-')} | ${escapeHtml(item.classGrade || item.className || item.class || '-')} | ${escapeHtml(item.room || '-')}</div>
                </div>
            `);
        }

        function renderTeacherPanels() {
            renderSalaryRecord();
            renderTimeTable();
            renderIncomingComplaints();
            renderTeacherLeaveHistory();
            renderAssignedClasses();
            renderAssignedLectures();
            renderSelfAttendance();
        }

        function showTeacherPanel(panelId) {
            const portal = document.querySelector('.teacher-portal');
            const target = document.getElementById(panelId);
            if (!portal || !target) return;

            document.querySelectorAll('.teacher-option-panel').forEach((panel) => {
                panel.classList.remove('active', 'portal-screen-active');
                const existingBack = panel.querySelector('.portal-screen-back');
                if (existingBack) existingBack.remove();
            });

            portal.classList.add('portal-screen-open');
            target.classList.add('active', 'portal-screen-active');

            const backButton = document.createElement('button');
            backButton.type = 'button';
            backButton.className = 'portal-screen-back';
            backButton.innerHTML = `<i data-lucide="arrow-left" width="16"></i> Back to Menu`;
            backButton.addEventListener('click', closeTeacherPanelScreen);
            target.insertBefore(backButton, target.firstChild);

            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            if (window.lucide) window.lucide.createIcons();
        }

        function closeTeacherPanelScreen() {
            const portal = document.querySelector('.teacher-portal');
            portal?.classList.remove('portal-screen-open');
            document.querySelectorAll('.teacher-option-panel').forEach((panel) => {
                panel.classList.remove('active', 'portal-screen-active');
                const existingBack = panel.querySelector('.portal-screen-back');
                if (existingBack) existingBack.remove();
            });
            document.querySelector('.teacher-options')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderSchedule(schedule) {
            const list = document.getElementById('scheduleList');
            if (!schedule.length) {
                list.innerHTML = '<div class="empty-note">No lectures have been assigned yet.</div>';
                return;
            }

            list.innerHTML = schedule.map((item) => {
                const day = item.day || item.weekDay || 'Lecture';
                const className = item.classGrade || item.className || item.class || '-';
                const subject = item.subject || '-';
                const time = [item.startTime || item.start, item.endTime || item.end].filter(Boolean).join(' - ') || item.time || '-';
                return `
                    <div class="list-item">
                        <div class="list-item-top">
                            <span>${day}</span>
                            <span>${time}</span>
                        </div>
                        <div class="muted">${className} | ${subject}</div>
                    </div>
                `;
            }).join('');
        }

        async function loadAttendance(teacherId) {
            const list = document.getElementById('attendanceList');
            try {
                const response = await fetch(`${API_BASE_URL}/teacher-attendance`, {
                    headers: authToken ? { Authorization: `Bearer ${authToken}` } : {}
                });
                const records = response.ok ? await response.json() : [];
                const attendance = Array.isArray(records)
                    ? records.filter((item) => String(item.teacherId || item.id || '') === String(teacherId))
                    : [];

                const now = new Date();
                const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const monthRecords = attendance.filter((item) => String(item.date || '').startsWith(monthKey));
                const present = monthRecords.filter((item) => String(item.status || '').toLowerCase() === 'present').length;
                setText('attendanceSummary', monthRecords.length ? `${present}/${monthRecords.length}` : '-');

                if (!monthRecords.length) {
                    list.innerHTML = '<div class="empty-note">No attendance record is available for this month.</div>';
                    return;
                }

                list.innerHTML = monthRecords.slice(-8).reverse().map((item) => `
                    <div class="list-item">
                        <div class="list-item-top">
                            <span>${item.date || '-'}</span>
                            <span>${item.status || '-'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (_error) {
                list.innerHTML = '<div class="empty-note">Attendance could not be loaded.</div>';
            }
        }

        async function loadNotices() {
            const list = document.getElementById('noticeList');
            try {
                const response = await fetch(`${API_BASE_URL}/special-notices?portal=teacher`);
                const notices = response.ok ? await response.json() : [];
                if (!Array.isArray(notices) || !notices.length) {
                    list.innerHTML = '<div class="empty-note">No teacher notices are available.</div>';
                    return;
                }

                list.innerHTML = notices.slice(0, 6).map((notice) => `
                    <div class="list-item">
                        <div class="list-item-top">
                            <span>${notice.title || 'Notice'}</span>
                            <span>${notice.noticeDate || notice.createdAt || ''}</span>
                        </div>
                        <div class="muted">${notice.message || notice.description || ''}</div>
                    </div>
                `).join('');
            } catch (_error) {
                list.innerHTML = '<div class="empty-note">Notices could not be loaded.</div>';
            }
        }

        function applyTeacherData(teacher) {
            currentTeacherProfile = teacher;
            const name = teacher.fullName || loggedInUser?.fullName || 'Teacher';
            const avatar = document.getElementById('teacherAvatar');
            if (teacher.profileImage) {
                avatar.innerHTML = `<img src="${teacher.profileImage}" alt="${name}">`;
            } else {
                avatar.textContent = name.charAt(0).toUpperCase();
            }

            setText('teacherName', name);
            setText('teacherRoleLine', `${teacher.designation || 'Teacher'} | ${teacher.subject || '-'}`);
            setText('teacherUsername', teacher.username || loggedInUser?.username || '-');
            setText('teacherCampus', teacher.campusName || loggedInUser?.campusName || '-');
            setText('employeeCode', teacher.employeeCode || teacher.id || '-');
            setText('subjectStat', teacher.subject || '-');
            setText('salaryStat', formatCurrency(teacher.salary));
            setText('fatherName', teacher.fatherName || '-');
            setText('cnic', teacher.cnic || '-');
            setText('phone', teacher.phone || '-');
            setText('email', teacher.email || '-');
            setText('qualification', teacher.qualification || '-');
            setText('address', teacher.address || '-');

            const schedule = normalizeSchedule(teacher.schedule);
            setText('lectureCount', String(schedule.length));
            renderTeacherPanels();
        }

        function getTeacherComplaintSenderId() {
            return String(currentTeacherProfile?.id || currentTeacherProfile?.employeeCode || loggedInUser?.id || loggedInUser?.username || '').trim().toLowerCase();
        }

        function renderTeacherComplaints() {
            const list = document.getElementById('teacherComplaintHistory');
            if (!list) return;
            const senderId = getTeacherComplaintSenderId();
            const complaints = readLocal(COMPLAINT_KEY)
                .filter((item) => item.senderRole === 'Teacher' && String(item.senderId || '').trim().toLowerCase() === senderId)
                .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
            if (!complaints.length) {
                list.innerHTML = '<div class="empty-note">No complaints submitted yet.</div>';
                return;
            }
            list.innerHTML = complaints.map((item) => `
                <div class="list-item">
                    <div class="list-item-top">
                        <span>${escapeHtml(item.subject || 'Complaint')}</span>
                        <span>${escapeHtml(item.status || 'Pending')}</span>
                    </div>
                    <div class="muted">${escapeHtml(item.message || '-')}</div>
                    ${item.reply ? `<div class="empty-note" style="margin-top:8px;"><strong>Admin Reply:</strong><br>${escapeHtml(item.reply)}</div>` : ''}
                </div>
            `).join('');
        }

        function submitTeacherComplaint(event) {
            event.preventDefault();
            const subject = document.getElementById('teacherComplaintSubject').value.trim();
            const message = document.getElementById('teacherComplaintMessage').value.trim();
            if (!subject || !message) {
                showAppAlert('Complaint subject and message are required.', 'Missing Complaint');
                return;
            }
            const complaints = readLocal(COMPLAINT_KEY);
            complaints.push({
                id: `COMP-${Date.now()}`,
                senderRole: 'Teacher',
                senderId: getTeacherComplaintSenderId(),
                senderName: currentTeacherProfile?.fullName || loggedInUser?.fullName || 'Teacher',
                senderClass: currentTeacherProfile?.subject || currentTeacherProfile?.designation || '',
                subject,
                message,
                status: 'Pending',
                createdAt: new Date().toISOString()
            });
            localStorage.setItem(COMPLAINT_KEY, JSON.stringify(complaints));
            event.target.reset();
            renderTeacherComplaints();
            showAppAlert('Your complaint has been submitted.', 'Complaint Sent');
        }

        async function submitSelfAttendance(event) {
            event.preventDefault();
            const teacherId = getTeacherIdentity();
            const date = document.getElementById('teacherAttendanceDate')?.value || todayKey();
            const status = document.getElementById('teacherAttendanceStatus')?.value || 'Present';
            if (!teacherId) {
                showAppAlert('Teacher profile is not loaded yet.', 'Attendance Failed');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/teacher-attendance`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(authToken ? { Authorization: `Bearer ${authToken}` } : {})
                    },
                    body: JSON.stringify({ teacherId, date, status })
                });
                const result = response.ok ? await response.json() : null;
                if (!response.ok || result?.success === false) throw new Error(result?.message || 'Attendance could not be saved.');
                if (result?.attendance) localStorage.setItem('eduCore_teacher_attendance', JSON.stringify(result.attendance));
                await renderSelfAttendance();
                showAppAlert('Your attendance has been saved.', 'Attendance Saved');
            } catch (_error) {
                showAppAlert('Attendance could not be saved. Please try again.', 'Attendance Failed');
            }
        }

        function submitTeacherLeave(event) {
            event.preventDefault();
            const fromDate = document.getElementById('teacherLeaveFrom')?.value || '';
            const toDate = document.getElementById('teacherLeaveTo')?.value || '';
            const reason = document.getElementById('teacherLeaveReason')?.value.trim() || '';
            if (!fromDate || !toDate || !reason) {
                showAppAlert('Leave dates and reason are required.', 'Missing Leave Details');
                return;
            }

            const requests = readLocal(TEACHER_LEAVE_KEY);
            requests.push({
                id: `TLEAVE-${Date.now()}`,
                teacherId: getTeacherIdentity(),
                teacherName: currentTeacherProfile?.fullName || loggedInUser?.fullName || 'Teacher',
                subject: currentTeacherProfile?.subject || '',
                fromDate,
                toDate,
                reason,
                status: 'Pending',
                createdAt: new Date().toISOString()
            });
            localStorage.setItem(TEACHER_LEAVE_KEY, JSON.stringify(requests));
            event.target.reset();
            renderTeacherLeaveHistory();
            showAppAlert('Your leave request has been submitted.', 'Leave Submitted');
        }

        function bindTeacherPortalOptions() {
            document.querySelectorAll('[data-teacher-panel]').forEach((button) => {
                button.addEventListener('click', () => {
                    const panelId = button.getAttribute('data-teacher-panel');
                    renderTeacherPanels();
                    showTeacherPanel(panelId);
                });
            });
            document.getElementById('teacherSelfAttendanceForm')?.addEventListener('submit', submitSelfAttendance);
            document.getElementById('teacherLeaveForm')?.addEventListener('submit', submitTeacherLeave);
            const attendanceDate = document.getElementById('teacherAttendanceDate');
            if (attendanceDate && !attendanceDate.value) attendanceDate.value = todayKey();
        }

        function getTeacherFallback() {
            const teachers = JSON.parse(localStorage.getItem('eduCore_teachers') || '[]');
            return teachers.find((teacher) => String(teacher.id) === String(loggedInUser?.id));
        }

        async function loadTeacherProfile() {
            if (!loggedInUser || loggedInUser.role !== 'Teacher' || !authToken) {
                window.location.replace('/login');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/teacher/me`, {
                    headers: { Authorization: `Bearer ${authToken}` }
                });
                if (!response.ok) throw new Error('Unable to load teacher profile.');
                const teacher = await response.json();
                applyTeacherData(teacher);
            } catch (_error) {
                const fallback = getTeacherFallback();
                if (fallback) {
                    applyTeacherData(fallback);
                    return;
                }
                await showAppAlert('The teacher profile could not be loaded. Please sign in again.');
                logoutUser();
            }
        }

        window.addEventListener('load', () => {
            loadTeacherProfile();
            bindTeacherPortalOptions();
            lucide.createIcons();
        });
    </script>
</body>

</html>
