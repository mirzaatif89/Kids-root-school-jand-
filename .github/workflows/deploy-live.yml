name: Auto Deploy Live (cPanel SSH)

on:
  push:
    branches:
      - main
      - happy-day-restore
  workflow_dispatch:

concurrency:
  group: live-deploy-ssh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required SSH secrets
        shell: bash
        env:
          LIVE_HOST: ${{ secrets.LIVE_HOST }}
          LIVE_USER: ${{ secrets.LIVE_USER }}
          LIVE_PORT: ${{ secrets.LIVE_PORT }}
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_SSH_PASSPHRASE: ${{ secrets.LIVE_SSH_PASSPHRASE }}
          LIVE_APP_PATH: ${{ secrets.LIVE_APP_PATH }}
        run: |
          missing=()
          for v in LIVE_HOST LIVE_USER LIVE_PORT LIVE_SSH_KEY LIVE_SSH_PASSPHRASE LIVE_APP_PATH; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Prepare SSH key
        shell: bash
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_SSH_PASSPHRASE: ${{ secrets.LIVE_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$LIVE_SSH_KEY" > ~/.ssh/live_deploy_key
          chmod 600 ~/.ssh/live_deploy_key
          eval "$(ssh-agent -s)"

          if [ -n "${LIVE_SSH_PASSPHRASE:-}" ]; then
            printf '#!/usr/bin/env bash\nprintf "%%s\\n" "$LIVE_SSH_PASSPHRASE"\n' > ~/.ssh/askpass.sh
            chmod 700 ~/.ssh/askpass.sh
            DISPLAY=:0 SSH_ASKPASS="$HOME/.ssh/askpass.sh" SSH_ASKPASS_REQUIRE=force setsid ssh-add ~/.ssh/live_deploy_key < /dev/null
          else
            ssh-add ~/.ssh/live_deploy_key
          fi
          ssh-add -l

      - name: Upload code via rsync over SSH
        shell: bash
        env:
          LIVE_HOST: ${{ secrets.LIVE_HOST }}
          LIVE_USER: ${{ secrets.LIVE_USER }}
          LIVE_PORT: ${{ secrets.LIVE_PORT }}
          LIVE_APP_PATH: ${{ secrets.LIVE_APP_PATH }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -p $LIVE_PORT -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules/' \
            --exclude='logs/' \
            --exclude='tmp/' \
            --exclude='uploads/' \
            --exclude='.whatsapp-session/' \
            --exclude='deploy-ready/' \
            --exclude='admin_credentials.json' \
            --exclude='stderr.log' \
            --exclude='stdout.log' \
            ./ "$LIVE_USER@$LIVE_HOST:$LIVE_APP_PATH/"

      - name: Install dependencies and restart marker
        shell: bash
        env:
          LIVE_HOST: ${{ secrets.LIVE_HOST }}
          LIVE_USER: ${{ secrets.LIVE_USER }}
          LIVE_PORT: ${{ secrets.LIVE_PORT }}
          LIVE_APP_PATH: ${{ secrets.LIVE_APP_PATH }}
        run: |
          set -euo pipefail
          ssh -p "$LIVE_PORT" -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no "$LIVE_USER@$LIVE_HOST" \
            "LIVE_APP_PATH='$LIVE_APP_PATH' bash -s" << 'EOF'
          set -e
          cd "$LIVE_APP_PATH"
          APP_NAME="$(basename "$LIVE_APP_PATH")"
          VENV="$HOME/nodevenv/$APP_NAME/20/bin/activate"
          if [ -f "$VENV" ]; then
            . "$VENV"
          fi
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt
          EOF
