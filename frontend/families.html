<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Families - Apexiums School System</title>
    <link rel="stylesheet" href="style.css?v=20260520-login-apexiums-brand">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .family-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
        .family-card { background:#fff; border:1px solid var(--border-color); border-radius:8px; padding:1rem; box-shadow:var(--shadow-sm); }
        .family-card h3 { margin:0 0 .4rem; color:var(--text-primary); }
        .family-card p { margin:.25rem 0; color:var(--text-secondary); }
        .family-details { background:#f8fafc; border:1px solid var(--border-color); border-radius:8px; padding:.65rem; margin:.65rem 0; }
        .family-card-footer { display:flex; align-items:center; justify-content:space-between; gap:.75rem; margin-top:.8rem; }
        .family-open-btn { border:1px solid #0f766e; background:#0f766e; color:#fff; border-radius:7px; padding:.45rem .7rem; font-size:.8rem; font-weight:800; cursor:pointer; }
        .family-list-screen { display:none; }
        .family-list-screen.active { display:block; }
        .families-overview.hidden { display:none; }
        .family-detail-panel { background:#fff; border:1px solid var(--border-color); border-radius:8px; padding:1rem; box-shadow:var(--shadow-sm); }
        .family-detail-top { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1rem; }
        .family-back-btn { border:1px solid var(--border-color); background:#fff; color:#0f766e; border-radius:7px; padding:.45rem .7rem; font-size:.8rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:.35rem; margin-bottom:1rem; }
        .family-student-table { width:100%; border-collapse:collapse; }
        .family-student-table th,
        .family-student-table td { border-bottom:1px solid #e2e8f0; padding:.65rem .55rem; text-align:left; font-size:.85rem; vertical-align:top; }
        .family-student-table th { color:#475569; text-transform:uppercase; font-size:.72rem; background:#f8fafc; }
        .family-student-empty { color:var(--text-secondary); background:#f8fafc; border:1px dashed #cbd5e1; border-radius:8px; padding:.7rem; font-size:.82rem; }
        .family-header { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:1.25rem; }
        .family-empty { grid-column:1 / -1; background:#fff; border:1px solid var(--border-color); border-radius:8px; padding:1.25rem; color:var(--text-secondary); box-shadow:var(--shadow-sm); }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="Apexiums School System logo"></div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a>
                <a href="families.html" class="nav-item active"><i data-lucide="home"></i><span>Families</span></a>
                <a href="teachers.html" class="nav-item"><i data-lucide="book-open"></i><span>Teachers</span></a>
                <a href="staff.html" class="nav-item"><i data-lucide="briefcase"></i><span>Staff</span></a>
            </nav>
            <a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Admin</p></div></a>
        </aside>
        <main class="main-content">
            <header class="header family-header">
                <div><h1>Families</h1></div>
            </header>
            <section id="familiesOverview" class="families-overview">
                <div id="familiesList" class="family-grid"></div>
            </section>
            <section id="familyListScreen" class="family-list-screen"></section>
        </main>
    </div>
    <script src="auth.js?v=20260520-sidebar-requested-order"></script>
    <script src="script.js?v=20260520-sidebar-classes-restore"></script>
    <script>
        function readLocalArray(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch (_e) { return []; } }
        function saveLocalArray(key, value) { localStorage.setItem(key, JSON.stringify(Array.isArray(value) ? value : [])); }
        function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char])); }
        function normalizePhone(value = '') { return String(value || '').replace(/\D/g, ''); }
        function normalizeFamilyText(value = '') { return String(value || '').trim().toLowerCase().replace(/\s+/g, ' '); }
        function normalizeFamilyContact(value = '') {
            const digits = normalizePhone(value);
            return digits || normalizeFamilyText(value);
        }
        function familyMatchKey(familyName = '', familyNo = '', familyContact = '') {
            const nameKey = String(familyName || '').trim().toLowerCase().replace(/\s+/g, ' ');
            const numberKey = String(familyNo || '').trim().toLowerCase().replace(/\s+/g, ' ');
            const contactKey = normalizeFamilyContact(familyContact);
            return nameKey && numberKey && contactKey ? `${nameKey}|${numberKey}|${contactKey}` : '';
        }
        function getStudentFamilyGroupKey(student) {
            const key = familyMatchKey(student.familyName, student.familyNo, student.familyContact);
            return key ? `family-${key}` : '';
        }

        function buildFamilyGroups(families, students) {
            const groups = new Map();

            families.forEach((family) => {
                const groupId = familyMatchKey(family.name, family.familyNo, family.familyContact);
                if (!groupId) return;
                groups.set(`family-${groupId}`, {
                    id: family.id || groupId,
                    name: String(family.name || '').trim(),
                    familyNo: String(family.familyNo || '').trim(),
                    familyContact: String(family.familyContact || '').trim(),
                    members: []
                });
            });

            students.forEach((student) => {
                const groupId = getStudentFamilyGroupKey(student);
                if (!groupId) return;

                if (!groups.has(groupId)) {
                    groups.set(groupId, {
                        id: groupId,
                        name: String(student.familyName || '').trim(),
                        familyNo: String(student.familyNo || '').trim(),
                        familyContact: String(student.familyContact || '').trim(),
                        members: []
                    });
                }

                const group = groups.get(groupId);
                if (student.familyContact && !group.familyContact) group.familyContact = student.familyContact;
                group.members.push(student);
            });

            return Array.from(groups.values())
                .sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
        }
        function renderFamiliesPage() {
            const families = readLocalArray('eduCore_families');
            const students = readLocalArray('eduCore_students');
            const list = document.getElementById('familiesList');
            const groups = buildFamilyGroups(families, students);
            if (!groups.length) {
                list.innerHTML = '<div class="family-empty">No family added yet.</div>';
                return;
            }
            list.innerHTML = groups.map((family) => {
                const members = family.members || [];
                return `<article class="family-card">
                    <h3>${esc(family.name || 'Family')}</h3>
                    <div class="family-details">
                        <p><strong>Family Name:</strong> ${esc(family.name || '-')}</p>
                        <p><strong>Family No.:</strong> ${esc(family.familyNo || '-')}</p>
                        <p><strong>Family Contact:</strong> ${esc(family.familyContact || '-')}</p>
                    </div>
                    <div class="family-card-footer">
                        <p><strong>Total Students:</strong> ${members.length}</p>
                        <button class="family-open-btn" type="button" onclick="openFamilyScreen('${esc(family.id)}')">Open</button>
                    </div>
                </article>`;
            }).join('');
        }
        function renderFamilyStudentTable(members) {
            if (!members.length) return '<div class="family-student-empty">No students linked with this family.</div>';
            return `<table class="family-student-table">
                <thead><tr><th>#</th><th>Student</th><th>Class</th><th>Roll</th><th>Contact</th><th>Father</th></tr></thead>
                <tbody>${members.map((student, index) => `<tr>
                    <td>${index + 1}</td>
                    <td>${esc(student.fullName || 'Student')}</td>
                    <td>${esc(student.classGrade || '-')}</td>
                    <td>${esc(student.rollNo || '-')}</td>
                    <td>${esc(student.parentPhone || '-')}</td>
                    <td>${esc(student.fatherName || '-')}</td>
                </tr>`).join('')}</tbody>
            </table>`;
        }
        function openFamilyScreen(familyId) {
            const families = readLocalArray('eduCore_families');
            const students = readLocalArray('eduCore_students');
            const family = buildFamilyGroups(families, students).find((item) => String(item.id) === String(familyId));
            if (!family) return;

            const overview = document.getElementById('familiesOverview');
            const screen = document.getElementById('familyListScreen');
            overview.classList.add('hidden');
            screen.classList.add('active');
            screen.innerHTML = `
                <button class="family-back-btn" type="button" onclick="closeFamilyScreen()"><i data-lucide="arrow-left" width="15"></i> Back to Families</button>
                <article class="family-detail-panel">
                    <div class="family-detail-top">
                        <div>
                            <h2 style="margin:0;color:var(--text-primary);">${esc(family.name || 'Family')}</h2>
                            <p style="margin:.35rem 0 0;color:var(--text-secondary);"><strong>Total Students:</strong> ${(family.members || []).length}</p>
                        </div>
                        <div class="family-details" style="margin:0;min-width:240px;">
                            <p><strong>Family Name:</strong> ${esc(family.name || '-')}</p>
                            <p><strong>Family No.:</strong> ${esc(family.familyNo || '-')}</p>
                            <p><strong>Family Contact:</strong> ${esc(family.familyContact || '-')}</p>
                        </div>
                    </div>
                    <h3 style="margin:0 0 .75rem;color:var(--text-primary);">Family Students</h3>
                    ${renderFamilyStudentTable(family.members || [])}
                </article>
            `;
            if (window.lucide) window.lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function closeFamilyScreen() {
            document.getElementById('familyListScreen').classList.remove('active');
            document.getElementById('familyListScreen').innerHTML = '';
            document.getElementById('familiesOverview').classList.remove('hidden');
        }
        renderFamiliesPage();
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>

</html>
