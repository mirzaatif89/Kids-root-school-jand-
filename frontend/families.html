<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Families - Apexiums School System</title>
    <link rel="stylesheet" href="style.css?v=20260520-login-apexiums-brand">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .family-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
        .family-card { background:#fff; border:1px solid var(--border-color); border-radius:8px; padding:1rem; box-shadow:var(--shadow-sm); }
        .family-card h3 { margin:0 0 .4rem; color:var(--text-primary); }
        .family-card p { margin:.25rem 0; color:var(--text-secondary); }
        .family-details { background:#f8fafc; border:1px solid var(--border-color); border-radius:8px; padding:.65rem; margin:.65rem 0; }
        .student-chip-row { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.75rem; }
        .student-chip { background:rgba(32,176,164,.1); color:var(--primary-color); border-radius:999px; padding:.25rem .55rem; font-size:.78rem; font-weight:800; }
        .family-header { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:1.25rem; }
        .family-empty { grid-column:1 / -1; background:#fff; border:1px solid var(--border-color); border-radius:8px; padding:1.25rem; color:var(--text-secondary); box-shadow:var(--shadow-sm); }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="Apexiums School System logo"></div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a>
                <a href="families.html" class="nav-item active"><i data-lucide="home"></i><span>Families</span></a>
                <a href="teachers.html" class="nav-item"><i data-lucide="book-open"></i><span>Teachers</span></a>
                <a href="staff.html" class="nav-item"><i data-lucide="briefcase"></i><span>Staff</span></a>
            </nav>
            <a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Admin</p></div></a>
        </aside>
        <main class="main-content">
            <header class="header family-header">
                <div><h1>Families</h1></div>
            </header>
            <section id="familiesList" class="family-grid"></section>
        </main>
    </div>
    <script src="auth.js?v=20260520-sidebar-requested-order"></script>
    <script src="script.js?v=20260520-sidebar-classes-restore"></script>
    <script>
        function readLocalArray(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch (_e) { return []; } }
        function saveLocalArray(key, value) { localStorage.setItem(key, JSON.stringify(Array.isArray(value) ? value : [])); }
        function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char])); }
        function normalizePhone(value = '') { return String(value || '').replace(/\D/g, ''); }
        function familyMatchKey(familyName = '', familyNo = '') {
            const nameKey = String(familyName || '').trim().toLowerCase().replace(/\s+/g, ' ');
            const numberKey = String(familyNo || '').trim().toLowerCase().replace(/\s+/g, ' ');
            return nameKey && numberKey ? `${nameKey}|${numberKey}` : '';
        }
        function getStudentFamilyGroupKey(student) {
            const key = familyMatchKey(student.familyName, student.familyNo);
            return key ? `family-${key}` : '';
        }

        function buildFamilyGroups(families, students) {
            const groups = new Map();

            families.forEach((family) => {
                const groupId = familyMatchKey(family.name, family.familyNo);
                if (!groupId) return;
                groups.set(`family-${groupId}`, {
                    id: family.id || groupId,
                    name: String(family.name || '').trim(),
                    familyNo: String(family.familyNo || '').trim(),
                    familyContact: String(family.familyContact || '').trim(),
                    members: []
                });
            });

            students.forEach((student) => {
                const groupId = getStudentFamilyGroupKey(student);
                if (!groupId) return;

                if (!groups.has(groupId)) {
                    groups.set(groupId, {
                        id: groupId,
                        name: String(student.familyName || '').trim(),
                        familyNo: String(student.familyNo || '').trim(),
                        familyContact: String(student.familyContact || '').trim(),
                        members: []
                    });
                }

                const group = groups.get(groupId);
                if (student.familyContact && !group.familyContact) group.familyContact = student.familyContact;
                group.members.push(student);
            });

            return Array.from(groups.values())
                .sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
        }
        function renderFamiliesPage() {
            const families = readLocalArray('eduCore_families');
            const students = readLocalArray('eduCore_students');
            const list = document.getElementById('familiesList');
            const groups = buildFamilyGroups(families, students);
            if (!groups.length) {
                list.innerHTML = '<div class="family-empty">No family added yet.</div>';
                return;
            }
            list.innerHTML = groups.map((family) => {
                const members = family.members || [];
                return `<article class="family-card">
                    <h3>${esc(family.name || 'Family')}</h3>
                    <div class="family-details">
                        <p><strong>Family Name:</strong> ${esc(family.name || '-')}</p>
                        <p><strong>Family No.:</strong> ${esc(family.familyNo || '-')}</p>
                        <p><strong>Family Contact:</strong> ${esc(family.familyContact || '-')}</p>
                    </div>
                    <p><strong>Total Students:</strong> ${members.length}</p>
                    <div class="student-chip-row">${members.map((student) => `<span class="student-chip">${esc(student.fullName || 'Student')} (${esc(student.classGrade || '-')})</span>`).join('') || '<span class="student-chip">No students linked</span>'}</div>
                </article>`;
            }).join('');
        }
        renderFamiliesPage();
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>

</html>
