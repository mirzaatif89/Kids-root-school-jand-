<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complain Box - Apexiums School System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .module-panel { background:#fff; border:1px solid #cfe8e5; border-radius:14px; padding:1.25rem; box-shadow:0 12px 28px rgba(15,23,42,.06); margin-bottom:1rem; }
        .complaint-list { display:grid; gap:1rem; }
        .complaint-card { border:1px solid #d9ece9; border-radius:12px; padding:1rem; background:#fbfefe; }
        .complaint-top { display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin-bottom:.75rem; }
        .complaint-top h3 { margin:0; font-size:1rem; }
        .muted { color:var(--text-secondary); font-size:.86rem; }
        .status-pill { display:inline-flex; border-radius:999px; padding:.28rem .65rem; font-size:.78rem; font-weight:800; }
        .status-pill.pending { background:#fef3c7; color:#92400e; }
        .status-pill.replied { background:#dcfce7; color:#166534; }
        .reply-box { display:grid; gap:.5rem; margin-top:.9rem; }
        .reply-box textarea { width:100%; min-height:86px; border:1px solid #cbd5e1; border-radius:10px; padding:.7rem; font:inherit; resize:vertical; }
        .action-row { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.6rem; }
        .mini-btn { min-height:34px; border:0; border-radius:8px; padding:.45rem .75rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:.35rem; }
        .mini-btn.primary { background:#14b8a6; color:#fff; }
        .mini-btn.file { background:#e0f2fe; color:#0369a1; }
        .mini-btn.delete { background:#fee2e2; color:#b91c1c; }
        .empty-note { padding:1rem; border:1px dashed #cbd5e1; border-radius:12px; color:var(--text-secondary); background:#f8fafc; }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="Apexiums School System logo"></div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a>
                <a href="teachers.html" class="nav-item"><i data-lucide="book-open"></i><span>Teachers</span></a>
                <a href="staff.html" class="nav-item"><i data-lucide="briefcase"></i><span>Staff</span></a>
                <a href="classes.html" class="nav-item"><i data-lucide="school"></i><span>Classes</span></a>
                <a href="fees.html" class="nav-item"><i data-lucide="credit-card"></i><span>Fees</span></a>
                <a href="fee_challan.html" class="nav-item"><i data-lucide="file-text"></i><span>Fee Challan</span></a>
                <a href="teacher_salaries.html" class="nav-item"><i data-lucide="wallet"></i><span>Salaries</span></a>
                <a href="exams.html" class="nav-item"><i data-lucide="clipboard-list"></i><span>Exams</span></a>
                <a href="revenue.html" class="nav-item"><i data-lucide="trending-up"></i><span>Revenue</span></a>
                <a href="permissions.html" class="nav-item"><i data-lucide="shield"></i><span>Permissions</span></a>
                <a href="aboutme.html" class="nav-item"><i data-lucide="info"></i><span>About Us</span></a>
                <a href="#" class="nav-item" onclick="logoutUser(event)"><i data-lucide="log-out"></i><span>Logout</span></a>
            </nav>
            <a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Principal</p></div></a>
        </aside>
        <main class="main-content">
            <header class="header"><div><h1>Complain Box</h1><p style="color:var(--text-secondary); margin-top:.3rem;">Review complaints from students and teachers, then send replies.</p></div></header>
            <section class="module-panel">
                <div id="complaintList" class="complaint-list"></div>
            </section>
        </main>
    </div>
    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script>
        const COMPLAINT_KEY = 'eduCore_complaints';
        function readComplaints() { try { return JSON.parse(localStorage.getItem(COMPLAINT_KEY) || '[]'); } catch (_e) { return []; } }
        function saveComplaints(items) { localStorage.setItem(COMPLAINT_KEY, JSON.stringify(items)); }
        function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char])); }
        function sanitizeFileName(fileName) {
            return String(fileName || 'complaint-file').trim().replace(/[\\/:*?"<>|]+/g, '-') || 'complaint-file';
        }
        function downloadComplaintFile(id) {
            const item = readComplaints().find((complaint) => complaint.id === id);
            if (!item?.file?.dataUrl) {
                showAppAlert('No file is attached to this complaint.', 'File Missing');
                return;
            }
            const link = document.createElement('a');
            link.href = item.file.dataUrl;
            link.download = sanitizeFileName(item.file.name || 'complaint-file');
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            link.remove();
        }
        function getComplaintThread(item) {
            const thread = Array.isArray(item.thread) ? [...item.thread] : [];
            if (item.reply && !thread.some((entry) => entry.role === 'Admin' && entry.message === item.reply)) {
                thread.push({ role: 'Admin', name: 'Admin', message: item.reply, createdAt: item.repliedAt || item.updatedAt || item.createdAt });
            }
            return thread.sort((a, b) => String(a.createdAt || '').localeCompare(String(b.createdAt || '')));
        }
        function renderComplaints() {
            const complaints = readComplaints().sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
            if (!complaints.length) {
                complaintList.innerHTML = '<div class="empty-note">No complaints have been submitted yet.</div>';
                return;
            }
            complaintList.innerHTML = complaints.map((item) => {
                const status = String(item.status || 'Pending').toLowerCase();
                return `
                    <article class="complaint-card">
                        <div class="complaint-top">
                            <div>
                                <h3>${esc(item.subject || 'Complaint')}</h3>
                                <div class="muted">${esc(item.senderRole || '-')} - ${esc(item.senderName || '-')} ${item.senderClass ? `| ${esc(item.senderClass)}` : ''}</div>
                                <div class="muted">${esc(item.createdAt ? new Date(item.createdAt).toLocaleString() : '')}</div>
                            </div>
                            <span class="status-pill ${status}">${esc(item.status || 'Pending')}</span>
                        </div>
                        <p>${esc(item.message || '-')}</p>
                        ${item.file?.dataUrl ? `<button class="mini-btn file" onclick="downloadComplaintFile('${esc(item.id)}')"><i data-lucide="download" width="14"></i> ${esc(item.file.name || 'Download File')}</button>` : ''}
                        ${getComplaintThread(item).map((entry) => `<div class="empty-note"><strong>${esc(entry.role || 'Reply')} ${entry.name ? `- ${esc(entry.name)}` : ''}:</strong><br>${esc(entry.message || '-')}<div class="muted">${esc(entry.createdAt ? new Date(entry.createdAt).toLocaleString() : '')}</div></div>`).join('')}
                        <div class="reply-box">
                            <label for="reply-${esc(item.id)}">Reply</label>
                            <textarea id="reply-${esc(item.id)}" placeholder="Write reply"></textarea>
                        </div>
                        <div class="action-row">
                            <button class="mini-btn primary" onclick="replyComplaint('${esc(item.id)}')"><i data-lucide="send" width="14"></i> Save Reply</button>
                            <button class="mini-btn delete" onclick="deleteComplaint('${esc(item.id)}')"><i data-lucide="trash-2" width="14"></i> Delete</button>
                        </div>
                    </article>
                `;
            }).join('');
            if (window.lucide) window.lucide.createIcons();
        }
        function replyComplaint(id) {
            const items = readComplaints();
            const index = items.findIndex((item) => item.id === id);
            if (index < 0) return;
            const reply = document.getElementById(`reply-${id}`)?.value.trim() || '';
            if (!reply) { showAppAlert('Reply is required.', 'Missing Reply'); return; }
            const now = new Date().toISOString();
            const thread = getComplaintThread(items[index]);
            thread.push({ role: 'Admin', name: 'Admin', message: reply, createdAt: now });
            items[index] = { ...items[index], reply, thread, status: 'Replied', repliedAt: now };
            saveComplaints(items);
            renderComplaints();
            showAppAlert('Reply saved for this complaint.', 'Reply Saved');
        }
        async function deleteComplaint(id) {
            const confirmed = await showAppConfirm('Delete this complaint?', 'Delete Complaint');
            if (!confirmed) return;
            saveComplaints(readComplaints().filter((item) => item.id !== id));
            renderComplaints();
        }
        renderComplaints();
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>

</html>
